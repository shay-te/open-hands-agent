name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: sh ./scripts/install-python-deps.sh python editable

      - name: Install coverage
        run: python -m pip install coverage

      - name: Run unit tests with coverage
        run: |
          # .coveragerc sets parallel = true, so each `coverage run` writes to
          # a uniquely-suffixed data file (.coverage.<host>.<pid>.<rand>) and
          # `coverage combine` merges them before reporting. Do NOT use
          # `--append` here — coverage 7.x refuses to append in parallel mode.
          # Top-level integration tests
          coverage run -m unittest discover -s tests
          # Plus every core-lib's internal tests (per CLAUDE.md core-lib quality rule:
          # "Tests live inside the lib at <lib>/<lib>/tests/") AND any other
          # package-level tests/ directories (e.g. webserver/tests). Without these
          # loops, ~1000+ unit tests living inside packages never run in CI and
          # coverage is artificially low (~73% instead of ~90%).
          for tests_dir in */*/tests */tests; do
            # Skip the top-level tests/ — already covered by the first discover above.
            [ "$tests_dir" = "tests" ] && continue
            if [ -d "$tests_dir" ] && ls "$tests_dir"/test_*.py >/dev/null 2>&1; then
              coverage run -m unittest discover -s "$tests_dir" -t .
            fi
          done
          coverage combine
          coverage report --show-missing

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/bootstrap.sh scripts/install-python-deps.sh scripts/run-local.sh docker/entrypoint-run.sh
