  # rejected at startup if attempted inside a container. We still surface
  # KATO_AGENT_BACKEND so the rejection error fires with a clear message.
  KATO_AGENT_BACKEND: ${KATO_AGENT_BACKEND:-openhands}
  YOUTRACK_API_BASE_URL: ${YOUTRACK_API_BASE_URL}
  YOUTRACK_API_TOKEN: ${YOUTRACK_API_TOKEN}
