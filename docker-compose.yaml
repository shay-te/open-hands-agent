  OPENHANDS_TASK_SCAN_INTERVAL_SECONDS: ${OPENHANDS_TASK_SCAN_INTERVAL_SECONDS:-0}
  LLM_MODEL: ${OPENHANDS_LLM_MODEL:-}
  LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-}
  LLM_BASE_URL: ${OPENHANDS_LLM_BASE_URL:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OH_SECRET_KEY: ${OH_SECRET_KEY:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_REGION_NAME: ${AWS_REGION_NAME:-}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
  AWS_DEFAULT_REGION: ${AWS_REGION_NAME:-}
