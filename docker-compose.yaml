  OPENHANDS_LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-}
  OPENHANDS_LLM_BASE_URL: ${OPENHANDS_LLM_BASE_URL:-}
  OPENHANDS_MODEL_SMOKE_TEST_ENABLED: ${OPENHANDS_MODEL_SMOKE_TEST_ENABLED:-true}
