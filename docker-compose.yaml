  OH_WEB_URL: ${OPENHANDS_WEB_URL:-}
  OH_PERSISTENCE_DIR: /.openhands
  AGENT_SERVER_IMAGE_REPOSITORY: ${KATO_AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
  AGENT_SERVER_IMAGE_TAG: ${KATO_AGENT_SERVER_IMAGE_TAG:-1.12.0-python}

x-kato-service-env: &kato-service-env
  LOG_LEVEL: ${OPENHANDS_LOG_LEVEL:-error}
  UVICORN_LOG_LEVEL: ${OPENHANDS_LOG_LEVEL:-error}
  OH_SECRET_KEY: ${OH_SECRET_KEY:-}
  AGENT_SERVER_IMAGE_REPOSITORY: ${KATO_AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
  AGENT_SERVER_IMAGE_TAG: ${KATO_AGENT_SERVER_IMAGE_TAG:-1.12.0-python}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_REGION_NAME: ${AWS_REGION_NAME:-}
  AWS_DEFAULT_REGION: ${AWS_REGION_NAME:-}
  AWS_REGION: ${AWS_REGION_NAME:-}
  AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  SSH_AUTH_SOCK: /ssh-agent
  SANDBOX_VOLUMES: ${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw,${OPENHANDS_SSH_AUTH_SOCK_HOST_PATH:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro
  OH_PERSISTENCE_DIR: /data

services:
  openhands:
    profiles: ["openhands"]
    image: docker.openhands.dev/openhands/openhands:1.5
    pull_policy: ${OPENHANDS_PULL_POLICY:-missing}

    environment:
      <<: *kato-service-env
      LOG_ALL_EVENTS: ${OPENHANDS_CONTAINER_LOG_ALL_EVENTS:-true}
      LLM_MODEL: ${OPENHANDS_LLM_MODEL:-}
      LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # LLM_AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      # LLM_AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # LLM_AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      # LLM_AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SANDBOX_VOLUMES: ${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw
      # Bedrock variant (kept for reference):
      # OH_AGENT_SERVER_ENV: '{"LLM_API_KEY":"${AWS_ACCESS_KEY_ID:-}/${AWS_SECRET_ACCESS_KEY:-}/${AWS_REGION_NAME:-}", "AWS_ACCESS_KEY_ID":"${AWS_ACCESS_KEY_ID:-}", "AWS_SECRET_ACCESS_KEY":"${AWS_SECRET_ACCESS_KEY:-}", "AWS_DEFAULT_REGION":"${AWS_REGION_NAME:-}", "AWS_REGION":"${AWS_REGION_NAME:-}", "LLM_AWS_ACCESS_KEY_ID":"${AWS_ACCESS_KEY_ID:-}", "LLM_AWS_SECRET_ACCESS_KEY":"${AWS_SECRET_ACCESS_KEY:-}", "LLM_AWS_REGION_NAME":"${AWS_REGION_NAME:-}", "OH_SANDBOX_VOLUMES":"${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw"}'
      OH_AGENT_SERVER_ENV: '{"LLM_MODEL":"${OPENHANDS_LLM_MODEL:-}", "LLM_API_KEY":"${OPENHANDS_LLM_API_KEY:-}", "ANTHROPIC_API_KEY":"${ANTHROPIC_API_KEY:-}", "OH_SANDBOX_VOLUMES":"${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw"}'


    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MOUNT_DOCKER_DATA_ROOT:-./mount_docker_data}/openhands:/data
      - ${MOUNT_DOCKER_DATA_ROOT:-./mount_docker_data}/openhands_state:/.openhands
      - ${REPOSITORY_ROOT_PATH:-.}:/workspace/project
      - ${OPENHANDS_SSH_AUTH_SOCK_HOST_PATH:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
    extra_hosts:
      - host.docker.internal:host-gateway

  # openhands-testing:
  #   profiles: ["testing"]
  #   image: docker.openhands.dev/openhands/openhands:1.5
  #   pull_policy: ${OPENHANDS_PULL_POLICY:-missing}
  #   environment:
  #     <<: *kato-service-env
  #     LLM_MODEL: ${OPENHANDS_TESTING_LLM_MODEL:-}
  #     LLM_API_KEY: ${OPENHANDS_TESTING_LLM_API_KEY:-}
  #     LLM_BASE_URL: ${OPENHANDS_TESTING_LLM_BASE_URL:-}
  #     OH_AGENT_SERVER_ENV: >-
  #       {"LLM_MODEL":"${OPENHANDS_TESTING_LLM_MODEL:-}","LLM_API_KEY":"${OPENHANDS_TESTING_LLM_API_KEY:-}","LLM_BASE_URL":"${OPENHANDS_TESTING_LLM_BASE_URL:-}","AWS_ACCESS_KEY_ID":"${AWS_ACCESS_KEY_ID:-}","AWS_SECRET_ACCESS_KEY":"${AWS_SECRET_ACCESS_KEY:-}","AWS_REGION_NAME":"${AWS_REGION_NAME:-}","AWS_SESSION_TOKEN":"${AWS_SESSION_TOKEN:-}","AWS_DEFAULT_REGION":"${AWS_REGION_NAME:-}","AWS_REGION":"${AWS_REGION_NAME:-}","LLM_AWS_ACCESS_KEY_ID":"${AWS_ACCESS_KEY_ID:-}","LLM_AWS_SECRET_ACCESS_KEY":"${AWS_SECRET_ACCESS_KEY:-}","LLM_AWS_REGION_NAME":"${AWS_REGION_NAME:-}","LLM_AWS_SESSION_TOKEN":"${AWS_SESSION_TOKEN:-}","AWS_BEARER_TOKEN_BEDROCK":"${AWS_BEARER_TOKEN_BEDROCK:-}","SSH_AUTH_SOCK":"/ssh-agent","OH_SANDBOX_VOLUMES":"${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw,${OPENHANDS_SSH_AUTH_SOCK_HOST_PATH:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro"}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ${MOUNT_DOCKER_DATA_ROOT:-./mount_docker_data}/openhands-testing:/data
  #     - ${MOUNT_DOCKER_DATA_ROOT:-./mount_docker_data}/openhands_testing_state:/.openhands
  #     - ${REPOSITORY_ROOT_PATH:-.}:/workspace/project
  #     - ${OPENHANDS_SSH_AUTH_SOCK_HOST_PATH:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro
  #   ports:
  #     - "${OPENHANDS_TESTING_PORT:-3001}:3000"
  #   extra_hosts:
  #     - host.docker.internal:host-gateway

  kato:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    entrypoint: ["/app/docker/entrypoint-run.sh"]
    # No depends_on: the openhands service is profile-gated and may not be
    # running (e.g. KATO_AGENT_BACKEND=claude). The entrypoint waits for it
    # itself when the openhands backend is active.
    environment:
      <<: *kato-env
      REPOSITORY_ROOT_PATH: /workspace/project
    volumes:
      - ${REPOSITORY_ROOT_PATH:-.}:/workspace/project:rw
      - ${OPENHANDS_SSH_AUTH_SOCK_HOST_PATH:-/run/host-services/ssh-auth.sock}:/ssh-agent:ro
