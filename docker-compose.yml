services:
  openhands:
    image: docker.all-hands.dev/all-hands-ai/openhands:0.59
    pull_policy: always
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.all-hands.dev/all-hands-ai/runtime:0.59-nikolaik
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: ${OPENHANDS_LLM_MODEL:-}
      LLM_API_KEY: ${OPENHANDS_LLM_API_KEY:-}
      LLM_BASE_URL: ${OPENHANDS_LLM_BASE_URL:-}
      LLM_API_VERSION: ${OPENHANDS_LLM_API_VERSION:-}
      LLM_NUM_RETRIES: ${OPENHANDS_LLM_NUM_RETRIES:-}
      LLM_TIMEOUT: ${OPENHANDS_LLM_TIMEOUT:-}
      LLM_DISABLE_VISION: ${OPENHANDS_LLM_DISABLE_VISION:-}
      LLM_DROP_PARAMS: ${OPENHANDS_LLM_DROP_PARAMS:-}
      LLM_CACHING_PROMPT: ${OPENHANDS_LLM_CACHING_PROMPT:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-}
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      OH_WEB_URL: ${OPENHANDS_WEB_URL:-}
      OH_PERSISTENCE_DIR: ${OPENHANDS_STATE_DIR:-/.openhands}
      RUNTIME: ${OPENHANDS_RUNTIME:-docker}
      AGENT_SERVER_IMAGE_REPOSITORY: ${OPENHANDS_AGENT_SERVER_IMAGE_REPOSITORY:-}
      AGENT_SERVER_IMAGE_TAG: ${OPENHANDS_AGENT_SERVER_IMAGE_TAG:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OPENHANDS_STATE_DIR:-~/.openhands}:/.openhands
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
    extra_hosts:
      - host.docker.internal:host-gateway

  openhands-agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - openhands
    environment:
      OPENHANDS_AGENT_ISSUE_PLATFORM: ${OPENHANDS_AGENT_ISSUE_PLATFORM:-}
      OPENHANDS_AGENT_TICKET_SYSTEM: ${OPENHANDS_AGENT_TICKET_SYSTEM:-youtrack}
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN}
      YOUTRACK_PROJECT: ${YOUTRACK_PROJECT}
      YOUTRACK_ASSIGNEE: ${YOUTRACK_ASSIGNEE:-me}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_TOKEN: ${JIRA_TOKEN:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_PROJECT: ${JIRA_PROJECT:-}
      JIRA_ASSIGNEE: ${JIRA_ASSIGNEE:-}
      JIRA_REVIEW_STATE_FIELD: ${JIRA_REVIEW_STATE_FIELD:-status}
      JIRA_REVIEW_STATE: ${JIRA_REVIEW_STATE:-In Review}
      GITHUB_ISSUES_BASE_URL: ${GITHUB_ISSUES_BASE_URL:-https://api.github.com}
      GITHUB_ISSUES_TOKEN: ${GITHUB_ISSUES_TOKEN:-}
      GITHUB_ISSUES_OWNER: ${GITHUB_ISSUES_OWNER:-}
      GITHUB_ISSUES_REPO: ${GITHUB_ISSUES_REPO:-}
      GITHUB_ISSUES_ASSIGNEE: ${GITHUB_ISSUES_ASSIGNEE:-}
      GITHUB_ISSUES_REVIEW_STATE_FIELD: ${GITHUB_ISSUES_REVIEW_STATE_FIELD:-labels}
      GITHUB_ISSUES_REVIEW_STATE: ${GITHUB_ISSUES_REVIEW_STATE:-In Review}
      GITLAB_ISSUES_BASE_URL: ${GITLAB_ISSUES_BASE_URL:-https://gitlab.com/api/v4}
      GITLAB_ISSUES_TOKEN: ${GITLAB_ISSUES_TOKEN:-}
      GITLAB_ISSUES_PROJECT: ${GITLAB_ISSUES_PROJECT:-}
      GITLAB_ISSUES_ASSIGNEE: ${GITLAB_ISSUES_ASSIGNEE:-}
      GITLAB_ISSUES_REVIEW_STATE_FIELD: ${GITLAB_ISSUES_REVIEW_STATE_FIELD:-labels}
      GITLAB_ISSUES_REVIEW_STATE: ${GITLAB_ISSUES_REVIEW_STATE:-In Review}
      BITBUCKET_ISSUES_BASE_URL: ${BITBUCKET_ISSUES_BASE_URL:-https://api.bitbucket.org/2.0}
      BITBUCKET_ISSUES_TOKEN: ${BITBUCKET_ISSUES_TOKEN:-}
      BITBUCKET_ISSUES_WORKSPACE: ${BITBUCKET_ISSUES_WORKSPACE:-}
      BITBUCKET_ISSUES_REPO_SLUG: ${BITBUCKET_ISSUES_REPO_SLUG:-}
      BITBUCKET_ISSUES_ASSIGNEE: ${BITBUCKET_ISSUES_ASSIGNEE:-}
      BITBUCKET_ISSUES_REVIEW_STATE_FIELD: ${BITBUCKET_ISSUES_REVIEW_STATE_FIELD:-state}
      BITBUCKET_ISSUES_REVIEW_STATE: ${BITBUCKET_ISSUES_REVIEW_STATE:-resolved}
      REPOSITORY_ID: ${REPOSITORY_ID:-primary}
      REPOSITORY_DISPLAY_NAME: ${REPOSITORY_DISPLAY_NAME:-Primary Repository}
      REPOSITORY_LOCAL_PATH: ${REPOSITORY_LOCAL_PATH:-.}
      REPOSITORY_BASE_URL: ${REPOSITORY_BASE_URL}
      REPOSITORY_TOKEN: ${REPOSITORY_TOKEN}
      REPOSITORY_OWNER: ${REPOSITORY_OWNER}
      REPOSITORY_REPO_SLUG: ${REPOSITORY_REPO_SLUG}
      REPOSITORY_DESTINATION_BRANCH: ${REPOSITORY_DESTINATION_BRANCH:-}
      OPENHANDS_BASE_URL: http://openhands:3000
      OPENHANDS_API_KEY: ${OPENHANDS_API_KEY:-local}
      OPENHANDS_AGENT_MAX_RETRIES: ${OPENHANDS_AGENT_MAX_RETRIES:-5}
      OPENHANDS_AGENT_FAILURE_EMAIL_ENABLED: ${OPENHANDS_AGENT_FAILURE_EMAIL_ENABLED:-false}
      OPENHANDS_AGENT_FAILURE_EMAIL_TEMPLATE_ID: ${OPENHANDS_AGENT_FAILURE_EMAIL_TEMPLATE_ID:-0}
      OPENHANDS_AGENT_FAILURE_EMAIL_TO: ${OPENHANDS_AGENT_FAILURE_EMAIL_TO:-}
      OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_NAME: ${OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_NAME:-OpenHands Agent}
      OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_EMAIL: ${OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_EMAIL:-noreply@example.com}
      OPENHANDS_AGENT_COMPLETION_EMAIL_ENABLED: ${OPENHANDS_AGENT_COMPLETION_EMAIL_ENABLED:-false}
      OPENHANDS_AGENT_COMPLETION_EMAIL_TEMPLATE_ID: ${OPENHANDS_AGENT_COMPLETION_EMAIL_TEMPLATE_ID:-0}
      OPENHANDS_AGENT_COMPLETION_EMAIL_TO: ${OPENHANDS_AGENT_COMPLETION_EMAIL_TO:-}
      OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_NAME: ${OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_NAME:-OpenHands Agent}
      OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_EMAIL: ${OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_EMAIL:-noreply@example.com}
      YOUTRACK_REVIEW_STATE_FIELD: ${YOUTRACK_REVIEW_STATE_FIELD:-State}
      YOUTRACK_REVIEW_STATE: ${YOUTRACK_REVIEW_STATE:-In Review}
      EMAIL_CORE_LIB_SEND_IN_BLUE_API_KEY: ${EMAIL_CORE_LIB_SEND_IN_BLUE_API_KEY:-}
      SLACK_WEBHOOK_URL_ERRORS_EMAIL: ${SLACK_WEBHOOK_URL_ERRORS_EMAIL:-}
