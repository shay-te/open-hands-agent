# @package core_lib
github_core_lib:
    base_url: ${oc.env:GITHUB_API_BASE_URL,"https://api.github.com"}
    token: ${oc.env:GITHUB_API_TOKEN,""}
    owner: ${oc.env:GITHUB_OWNER,""}
    repo: ${oc.env:GITHUB_REPO,""}
    assignee: ${oc.env:GITHUB_ASSIGNEE,""}
    max_retries: ${oc.decode:${oc.env:GITHUB_CORE_LIB_MAX_RETRIES,"3"}}
