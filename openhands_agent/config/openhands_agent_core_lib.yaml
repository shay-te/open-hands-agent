# @package _global_
core_lib:
  app:
    name: openhands-agent
  data: {}
  email_core_lib:
    client:
      _target_: email_core_lib.client.send_in_blue_client.SendInBlueClient
      api_key: ${oc.env:EMAIL_CORE_LIB_SEND_IN_BLUE_API_KEY,""}
      slack_email_error_url: ${oc.env:SLACK_WEBHOOK_URL_ERRORS_EMAIL,""}

openhands_agent:
  issue_platform: ${oc.env:OPENHANDS_AGENT_ISSUE_PLATFORM,""}
  ticket_system: ${oc.env:OPENHANDS_AGENT_TICKET_SYSTEM,"youtrack"}
  retry:
    max_retries: ${oc.decode:${oc.env:OPENHANDS_AGENT_MAX_RETRIES,"3"}}
  failure_email:
    enabled: ${oc.decode:${oc.env:OPENHANDS_AGENT_FAILURE_EMAIL_ENABLED,"false"}}
    template_id: ${oc.env:OPENHANDS_AGENT_FAILURE_EMAIL_TEMPLATE_ID,0}
    body_template: failure_email.txt
    recipients:
      - ${oc.env:OPENHANDS_AGENT_FAILURE_EMAIL_TO,null}
    sender:
      name: ${oc.env:OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_NAME,"OpenHands Agent"}
      email: ${oc.env:OPENHANDS_AGENT_FAILURE_EMAIL_SENDER_EMAIL,"noreply@example.com"}
  completion_email:
    enabled: ${oc.decode:${oc.env:OPENHANDS_AGENT_COMPLETION_EMAIL_ENABLED,"false"}}
    template_id: ${oc.env:OPENHANDS_AGENT_COMPLETION_EMAIL_TEMPLATE_ID,0}
    body_template: completion_email.txt
    recipients:
      - ${oc.env:OPENHANDS_AGENT_COMPLETION_EMAIL_TO,null}
    sender:
      name: ${oc.env:OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_NAME,"OpenHands Agent"}
      email: ${oc.env:OPENHANDS_AGENT_COMPLETION_EMAIL_SENDER_EMAIL,"noreply@example.com"}
  youtrack:
    base_url: ${oc.env:YOUTRACK_BASE_URL}
    token: ${oc.env:YOUTRACK_TOKEN}
    project: ${oc.env:YOUTRACK_PROJECT}
    assignee: ${oc.env:YOUTRACK_ASSIGNEE,me}
    progress_state_field: ${oc.env:YOUTRACK_PROGRESS_STATE_FIELD,"State"}
    progress_state: ${oc.env:YOUTRACK_PROGRESS_STATE,"In Progress"}
    review_state_field: ${oc.env:YOUTRACK_REVIEW_STATE_FIELD,"State"}
    review_state: ${oc.env:YOUTRACK_REVIEW_STATE,"To Verify"}
    issue_states: ${oc.env:YOUTRACK_ISSUE_STATES,"Todo,Open"}
  jira:
    base_url: ${oc.env:JIRA_BASE_URL,""}
    token: ${oc.env:JIRA_TOKEN,""}
    email: ${oc.env:JIRA_EMAIL,""}
    project: ${oc.env:JIRA_PROJECT,""}
    assignee: ${oc.env:JIRA_ASSIGNEE,""}
    progress_state_field: ${oc.env:JIRA_PROGRESS_STATE_FIELD,"status"}
    progress_state: ${oc.env:JIRA_PROGRESS_STATE,"In Progress"}
    review_state_field: ${oc.env:JIRA_REVIEW_STATE_FIELD,"status"}
    review_state: ${oc.env:JIRA_REVIEW_STATE,"In Review"}
    issue_states: ${oc.env:JIRA_ISSUE_STATES,"To Do,Open"}
  github_issues:
    base_url: ${oc.env:GITHUB_ISSUES_BASE_URL,"https://api.github.com"}
    token: ${oc.env:GITHUB_API_TOKEN,""}
    owner: ${oc.env:GITHUB_ISSUES_OWNER,""}
    repo: ${oc.env:GITHUB_ISSUES_REPO,""}
    project: ${oc.env:GITHUB_ISSUES_REPO,""}
    assignee: ${oc.env:GITHUB_ISSUES_ASSIGNEE,""}
    progress_state_field: ${oc.env:GITHUB_ISSUES_PROGRESS_STATE_FIELD,"labels"}
    progress_state: ${oc.env:GITHUB_ISSUES_PROGRESS_STATE,"In Progress"}
    review_state_field: ${oc.env:GITHUB_ISSUES_REVIEW_STATE_FIELD,"labels"}
    review_state: ${oc.env:GITHUB_ISSUES_REVIEW_STATE,"In Review"}
    issue_states: ${oc.env:GITHUB_ISSUES_ISSUE_STATES,"open"}
  gitlab_issues:
    base_url: ${oc.env:GITLAB_ISSUES_BASE_URL,"https://gitlab.com/api/v4"}
    token: ${oc.env:GITLAB_API_TOKEN,""}
    project: ${oc.env:GITLAB_ISSUES_PROJECT,""}
    assignee: ${oc.env:GITLAB_ISSUES_ASSIGNEE,""}
    progress_state_field: ${oc.env:GITLAB_ISSUES_PROGRESS_STATE_FIELD,"labels"}
    progress_state: ${oc.env:GITLAB_ISSUES_PROGRESS_STATE,"In Progress"}
    review_state_field: ${oc.env:GITLAB_ISSUES_REVIEW_STATE_FIELD,"labels"}
    review_state: ${oc.env:GITLAB_ISSUES_REVIEW_STATE,"In Review"}
    issue_states: ${oc.env:GITLAB_ISSUES_ISSUE_STATES,"opened"}
  bitbucket_issues:
    base_url: ${oc.env:BITBUCKET_ISSUES_BASE_URL,"https://api.bitbucket.org/2.0"}
    token: ${oc.env:BITBUCKET_API_TOKEN,""}
    workspace: ${oc.env:BITBUCKET_ISSUES_WORKSPACE,""}
    repo_slug: ${oc.env:BITBUCKET_ISSUES_REPO_SLUG,""}
    project: ${oc.env:BITBUCKET_ISSUES_REPO_SLUG,""}
    assignee: ${oc.env:BITBUCKET_ISSUES_ASSIGNEE,""}
    progress_state_field: ${oc.env:BITBUCKET_ISSUES_PROGRESS_STATE_FIELD,"state"}
    progress_state: ${oc.env:BITBUCKET_ISSUES_PROGRESS_STATE,"open"}
    review_state_field: ${oc.env:BITBUCKET_ISSUES_REVIEW_STATE_FIELD,"state"}
    review_state: ${oc.env:BITBUCKET_ISSUES_REVIEW_STATE,"resolved"}
    issue_states: ${oc.env:BITBUCKET_ISSUES_ISSUE_STATES,"new,open"}
  repository_root_path: ${oc.env:REPOSITORY_ROOT_PATH,""}
  ignored_repository_folders: ${oc.env:OPENHANDS_AGENT_IGNORED_REPOSITORY_FOLDERS,""}
  repositories: []
  openhands:
    base_url: ${oc.env:OPENHANDS_BASE_URL}
    api_key: ${oc.env:OPENHANDS_API_KEY}
    llm_model: ${oc.env:OPENHANDS_LLM_MODEL,""}
    llm_base_url: ${oc.env:OPENHANDS_LLM_BASE_URL,""}
    testing_container_enabled: ${oc.decode:${oc.env:OPENHANDS_TESTING_CONTAINER_ENABLED,"false"}}
    testing_base_url: ${oc.env:OPENHANDS_TESTING_BASE_URL,""}
    testing_llm_model: ${oc.env:OPENHANDS_TESTING_LLM_MODEL,""}
    testing_llm_base_url: ${oc.env:OPENHANDS_TESTING_LLM_BASE_URL,""}
    poll_interval_seconds: ${oc.decode:${oc.env:OPENHANDS_POLL_INTERVAL_SECONDS,"2.0"}}
    max_poll_attempts: ${oc.decode:${oc.env:OPENHANDS_MAX_POLL_ATTEMPTS,"900"}}
