# @package _global_
core_lib:
  app:
    name: kato-test
  data: {}
  email_core_lib:
    client:
      _target_: email_core_lib.client.send_in_blue_client.SendInBlueClient
      api_key: test-send-in-blue-api-key
      slack_email_error_url: ""

kato:
  issue_platform: youtrack
  ticket_system: youtrack
  retry:
    max_retries: 5
  failure_email:
    enabled: true
    template_id: "42"
    body_template: failure_email.j2
    recipients:
      - ops@example.com
    sender:
      name: Kato
      email: noreply@example.com
  completion_email:
    enabled: true
    template_id: "77"
    body_template: completion_email.j2
    recipients:
      - reviewers@example.com
    sender:
      name: Kato
      email: noreply@example.com
  youtrack:
    base_url: http://localhost:8080
    token: test-youtrack-token
    project: TEST
    assignee: me
    review_state_field: State
    review_state: To Verify
    issue_states:
      - Todo
      - Open
  jira:
    base_url: http://localhost:8082
    token: test-jira-token
    email: developer@example.com
    project: TEST
    assignee: developer
    review_state_field: status
    review_state: In Review
    issue_states:
      - To Do
      - Open
  github_issues:
    base_url: https://api.github.com
    token: test-github-issues-token
    owner: test-owner
    repo: test-repo
    project: test-repo
    assignee: octocat
    review_state_field: labels
    review_state: In Review
    issue_states:
      - open
  gitlab_issues:
    base_url: http://localhost:8083/api/v4
    token: test-gitlab-issues-token
    project: group/test-repo
    assignee: developer
    review_state_field: labels
    review_state: In Review
    issue_states:
      - opened
  bitbucket_issues:
    base_url: https://api.bitbucket.org/2.0
    token: test-bitbucket-issues-token
    username: ""
    api_email: test-bitbucket-api-email@example.com
    workspace: test-workspace
    repo_slug: test-repo
    project: test-repo
    assignee: reviewer
    review_state_field: state
    review_state: resolved
    issue_states:
      - new
      - open
  repositories:
    - id: client
      display_name: Client
      local_path: .
      provider_base_url: http://localhost:8081
      token: test-bitbucket-token
      api_email: test-bitbucket-api-email@example.com
      owner: test-workspace
      repo_slug: test-repo
      destination_branch: ""
      aliases:
        - client
        - frontend
  openhands:
    base_url: http://localhost:3000
    api_key: test-openhands-api-key
