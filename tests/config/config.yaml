# @package _global_
core_lib:
  app:
    name: openhands-agent-test
  data:
    sqlalchemy:
      log_queries: false
      create_db: true
      session:
        pool_recycle: 3600
        pool_pre_ping: false
      url:
        protocol: sqlite
        username: ""
        password: ""
        host: ""
        port: ""
        path: ""
        file: ":memory:"
  alembic:
    version_table: alembic_version
    script_location: data_layers/data/db/migrations
    render_as_batch: true
  email_core_lib:
    client:
      _target_: email_core_lib.client.send_in_blue_client.SendInBlueClient
      api_key: test-send-in-blue-api-key
      slack_email_error_url: ""

openhands_agent:
  retry:
    max_retries: 5
  failure_email:
    enabled: true
    template_id: "42"
    body_template: failure_email.txt
    recipients:
      - ops@example.com
    sender:
      name: OpenHands Agent
      email: noreply@example.com
  completion_email:
    enabled: true
    template_id: "77"
    body_template: completion_email.txt
    recipients:
      - reviewers@example.com
    sender:
      name: OpenHands Agent
      email: noreply@example.com
  youtrack:
    base_url: http://localhost:8080
    token: test-youtrack-token
    project: TEST
    assignee: me
    review_state_field: State
    review_state: In Review
    issue_states:
      - Todo
      - Open
  repositories:
    - id: client
      display_name: Client
      local_path: .
      provider_base_url: http://localhost:8081
      token: test-bitbucket-token
      owner: test-workspace
      repo_slug: test-repo
      destination_branch: ""
      aliases:
        - client
        - frontend
  openhands:
    base_url: http://localhost:3000
    api_key: test-openhands-api-key
    pre_pull_request_commands:
      - Write tests that challenge the new code as much as possible.
      - Make sure the tests are green. If not, fix them before creating the pull request.
